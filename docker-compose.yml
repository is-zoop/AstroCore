services:
  astrocore-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: astrocore-backend
    ports:
      - "8000:8000"
    volumes:
      - C:/AstroCoreData/data:/app/backend/data
      - C:/AstroCoreData/storage:/app/backend/storage
    restart: unless-stopped

  astrocore-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: astrocore-frontend
    ports:
      - "3000:3000"
    depends_on:
      - astrocore-backend
    restart: unless-stopped